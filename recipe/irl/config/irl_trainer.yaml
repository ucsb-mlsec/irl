# the irl config will override default ppo_trainer.yaml

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# data related flags, mainly specify the data path, batch size, and context length
data: 
  filter_accuracy: True
  accuracy_lower_bound: 0.2
  accuracy_upper_bound: 0.8
  oversample_factor: 4.0 # Sample more responses than the batch size. prompts satisfying the filter will be prioritized.
  filter_truncate: False
  truncation: right
  return_raw_chat: True
  policy_train_files: []
  expert_demo_files: []
  policy_val_files: []
  shuffle: False

# actor and reference model related flags, mainly specify the model path, rollout parameters, and training parameters
actor_rollout_ref:
  hybrid_engine: True
  model:
    use_remove_padding: True
  rollout:
    # number of responses (i.e. num sample times)
    n: 8
    max_num_batched_tokens: 65536
  actor:
    entropy_coeff: 0.001

# reward model related flags, mainly specify the reward model path, and training parameters
reward_model:
  enable: True
  strategy: fsdp
  model:
    use_remove_padding:  True
    tokenizer_path: ${actor_rollout_ref.model.path}
    enable_gradient_checkpointing: ${actor_rollout_ref.model.enable_gradient_checkpointing}
    fsdp_config:
      min_num_params: 0
      param_offload: ${actor_rollout_ref.actor.fsdp_config.param_offload}
#      grad_offload: ${actor_rollout_ref.actor.fsdp_config.grad_offload}
      optimizer_offload: ${actor_rollout_ref.actor.fsdp_config.optimizer_offload}
      model_dtype: float16
    optim:
      lr: 1e-6
      lr_warmup_steps: -1 # Prioritized. Negative values mean delegating to lr_warmup_steps_ratio.
      lr_warmup_steps_ratio: 0.  # the total steps will be injected during runtime
      min_lr_ratio: null
      warmup_style: constant
      total_training_steps: -1  # must be overridden by program
      weight_decay: 0.
      grad_clip: 10.0
    beta_train: 0.05
    loss_type: ce # currently only supports ce loss
  mini_batch_size: ${actor_rollout_ref.actor.ppo_mini_batch_size}
  policy_reward_weight: 1.0
  rm_epochs: 1
  reward_manager: irl

# algorithm related flags, mainly specify the hyperparameters for the poilcy training algorithm
algorithm:
  adv_estimator: rloo # rloo, grpo, gae 
  kl_ctrl:
    type: fixed
    kl_coef: 0.000
  reward_gt_coef: 5
  reward_dpo_coef: 5

# trainer related flags, mainly specify how many nodes and GPU per node to use
trainer:
  project_name: irl
  experiment_name: examples
  val_before_train: True
  balance_batch: False
  max_ckpt_to_keep: 3